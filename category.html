	<style>
		.doc-list {
			list-style: none;
			padding: 0;
			margin: 0;
		}
		.doc-list li {
			padding: 0.625rem 1rem;
			border-bottom: 1px solid #e9ecef;
			display: flex;
			align-items: baseline;
			gap: 0.5rem;
		}
		.doc-list li:last-child {
			border-bottom: none;
		}
		.doc-list .doc-code {
			font-weight: 700;
			font-family: 'Quicksand', sans-serif;
			color: #1c1e2e;
			font-size: 0.875rem;
			white-space: nowrap;
		}
		.doc-list .doc-title {
			color: #4c527d;
			font-size: 0.85rem;
			line-height: 1.4;
		}
		.doc-list-wrapper {
			background: #fff;
			border-radius: 0.5rem;
			box-shadow: 0 5px 20px -4px rgba(0,0,0,0.08);
			padding: 1rem;
		}
		.doc-list-wrapper .list-title {
			font-size: 0.95rem;
			font-weight: bold;
			font-family: 'Quicksand', sans-serif;
			color: #ed6524;
			margin-bottom: 0.75rem;
			padding-bottom: 0.5rem;
			border-bottom: 2px solid #ed6524;
		}
		.loading {
			text-align: center;
			padding: 3rem 0;
			color: #4c527d;
		}
		.loading i {
			font-size: 2rem;
			color: #ed6524;
			margin-bottom: 1rem;
		}
		.error-msg {
			text-align: center;
			padding: 3rem 1rem;
			color: #dc3545;
		}
		.error-msg i {
			font-size: 2rem;
			margin-bottom: 1rem;
		}
	</style>
</head>

<body>
	<header class="header">
		<div class="branding">
			<div class="container-fluid position-relative py-3">
				<div class="logo-wrapper">
					<div class="site-logo"><a class="navbar-brand" href="index.html"><img class="logo-icon me-2"
								src="assets/images/site-logo.svg" alt="logo"><span class="logo-text">NotDore</span></a>
					</div>
				</div>
			</div>
		</div>
	</header>

	<section class="hero-section" id="hero-section">
		<div class="container">
			<div class="row" id="hero-row"></div>
		</div>
	</section>

	<section id="info-section" class="content-section">
		<div class="container">
			<div class="single-col-max mx-auto" id="overview-wrap">

							<ul class="key-points-list list-unstyled mb-4 mx-auto d-inline-block text-start" id="overview-list"></ul>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

			<div class="audience mx-auto" id="audience-list"></div>
		</div>
	</section>

		<div class="footer-bottom text-center py-5">

		const params = new URLSearchParams(window.location.search);
		const cat = params.get('cat') || 'vat';
		const API_BASE = window.location.origin;

		function renderHero(info, sidebarDocs) {
			document.getElementById('hero-row').innerHTML = `
				<div class="col-12 col-md-7 pt-5 mb-5 align-self-center">
					<div class="promo pe-md-3 pe-lg-5">
						<h1 class="headline mb-3">${info.title}</h1>
						<div class="subheadline mb-4">${info.description}</div>
						<div class="cta-holder row gx-md-3 gy-3 gy-md-0">
							<div class="col-12 col-md-auto"><a class="btn btn-primary w-100" href="#documents-section">Danh sách văn bản</a></div>
							<div class="col-12 col-md-auto"><a class="btn btn-secondary scrollto w-100" href="#info-section">Tổng quan</a></div>
						</div>
					</div>
				</div>
				<div class="col-12 col-md-5 mb-5 align-self-center">
					<div class="doc-list-wrapper">
						<div class="list-title"><i class="fas fa-file-alt me-2"></i>Văn bản mới nhất</div>
						<ul class="doc-list">${sidebarDocs.slice(0,6).map(d => `
							<li><i class="fas fa-file-alt me-2" style="color:#ed6524;font-size:0.75rem;"></i><span class="doc-code">${d.code}</span><span class="doc-title">${d.title}</span></li>
						`).join('')}</ul>
					</div>
				</div>
			`;
		}

		function renderOverview(info) {
			document.getElementById('overview-title').textContent = `Tổng quan về ${info.title}`;
			document.getElementById('overview-list').innerHTML = info.overview.map(p =>
				`<li><i class="fas fa-check-circle me-2"></i>${p}</li>`
			).join('');
		}

		function renderDocs(docs) {
			const grid = document.getElementById('doc-grid');
			if (!docs.length) {
				grid.innerHTML = '<div class="col-12"><p class="text-muted">Chưa có văn bản nào.</p></div>';
				return;
			}
			grid.innerHTML = docs.map((d, i) => `
				<div class="item col-12 col-md-6 col-lg-4">
					<div class="item-inner p-3 p-lg-4">
						<div class="item-header mb-3">
							<div class="item-icon"><i class="fas fa-${ICONS[i % ICONS.length]}"></i></div>
							<h3 class="item-heading">${d.code}</h3>
						</div>
						<div class="item-desc">${d.title}</div>
					</div>
				</div>
			`).join('');
		}

		function renderAudience(info) {
			const section = document.getElementById('audience-section');
			section.classList.remove('d-none');
			document.getElementById('audience-intro').textContent = `${info.title} áp dụng cho các đối tượng theo quy định của pháp luật.`;
			document.getElementById('audience-list').innerHTML = info.audience.map(a => `
				<div class="item row gx-3">
					<div class="col-auto item-icon"><i class="fas fa-${a.icon}"></i></div>
					<div class="col"><h4 class="item-title">${a.title}</h4><div class="item-desc">${a.desc}</div></div>
				</div>
			`).join('');
		}

		async function init() {
			const info = CATEGORY_INFO[cat];
			if (!info) { window.location.href = 'index.html'; return; }
			document.title = `${info.title} - NotDore`;

			let docs = CATEGORY_DOCS[cat] || [];

			try {
				const res = await fetch(`${API_BASE}/api/documents?cat=${cat}`);
				if (res.ok) docs = await res.json();
			} catch (_) {}

			renderHero(info, docs);
			renderOverview(info);
			renderDocs(docs);
			renderAudience(info);
		}

		init();
	</script>
</body>

</html>
