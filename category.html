<!DOCTYPE html>
<html lang="vi">

<head>
	<title>NotDore – Danh mục văn bản</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Tra cứu văn bản pháp luật theo chuyên mục: thuế giá trị gia tăng, thuế thu nhập cá nhân, thuế thu nhập doanh nghiệp, bảo hiểm xã hội.">
	<meta name="author" content="Theodore">
	<link rel="shortcut icon" href="favicon.ico">
	<link href="https://fonts.googleapis.com/css?family=Quicksand:700|Roboto:400,400i,700&display=swap" rel="stylesheet">
	<script defer src="assets/fontawesome/js/all.min.js"></script>
	<link id="theme-style" rel="stylesheet" href="assets/css/theme.css">
	<style>
		/* Sidebar */
		.sidebar-box {
			background: #fff;
			border-radius: 0.5rem;
			box-shadow: 0 5px 20px -4px rgba(0, 0, 0, 0.08);
			padding: 1rem;
		}
		.sidebar-box__title {
			font-size: 0.95rem;
			font-weight: bold;
			font-family: 'Quicksand', sans-serif;
			color: #ed6524;
			margin-bottom: 0.75rem;
			padding-bottom: 0.5rem;
			border-bottom: 2px solid #ed6524;
		}
		#sidebar-list {
			list-style: none;
			padding: 0;
			margin: 0;
		}
		.sidebar-item {
			padding: 0.625rem 1rem;
			border-bottom: 1px solid #e9ecef;
			display: flex;
			align-items: baseline;
			gap: 0.5rem;
		}
		.sidebar-item--empty,
		.sidebar-item--error { font-size: 0.875rem; color: #6c757d; }
		.sidebar-item--error  { color: #dc3545; }
		.sidebar-item__icon   { color: #ed6524; font-size: 0.75rem; flex-shrink: 0; }
		.sidebar-item__code   { font-weight: 700; font-family: 'Quicksand', sans-serif; color: #1c1e2e; font-size: 0.875rem; white-space: nowrap; }
		.sidebar-item__title  { color: #4c527d; font-size: 0.85rem; line-height: 1.4; }

		/* Document card */
		.doc-card__date    { font-size: 0.8rem; color: #6c757d; margin-top: 0.25rem; }
		.doc-card__actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
	</style>
</head>

<body>
	<header class="header">
		<div class="branding">
			<div class="container-fluid position-relative py-3">
				<div class="logo-wrapper">
					<div class="site-logo">
						<a class="navbar-brand" href="index.html">
							<img class="logo-icon me-2" src="assets/images/site-logo.svg" alt="logo">
							<span class="logo-text">NotDore</span>
						</a>
					</div>
				</div>
			</div>
		</div>
	</header>

	<section class="hero-section" id="hero-section">
		<div class="container">
			<div class="row">
				<div class="col-12 col-md-7 pt-5 mb-5 align-self-center">
					<div class="promo pe-md-3 pe-lg-5">
						<h1 class="headline mb-3" id="category-title">Danh mục</h1>
						<div class="subheadline mb-4" id="category-desc"></div>
						<div class="cta-holder row gx-md-3 gy-3 gy-md-0">
							<div class="col-12 col-md-auto">
								<a class="btn btn-primary w-100 scrollto" href="#documents-section">Danh sách văn bản</a>
							</div>
							<div class="col-12 col-md-auto">
								<a class="btn btn-secondary scrollto w-100" href="#info-section">Tổng quan</a>
							</div>
						</div>
					</div>
				</div>
				<div class="col-12 col-md-5 mb-5 align-self-center">
					<div class="sidebar-box">
						<div class="sidebar-box__title">
							<i class="fas fa-file-alt me-2"></i>Văn bản mới nhất
						</div>
						<ul id="sidebar-list">
							<li class="sidebar-item sidebar-item--empty">
								<i class="fas fa-spinner fa-spin me-2"></i>Đang tải...
							</li>
						</ul>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section id="info-section" class="content-section">
		<div class="container">
			<div class="single-col-max mx-auto">
				<h2 class="section-heading text-center mb-5">Tổng quan</h2>
				<div class="row">
					<div class="col-12 mb-5">
						<div class="key-points mb-4 text-center">
							<ul class="key-points-list list-unstyled mb-4 mx-auto d-inline-block text-start" id="overview-list"></ul>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section id="documents-section" class="benefits-section theme-bg-light-gradient py-5">
		<div class="container py-5">
			<h2 class="section-heading text-center mb-3" id="documents-heading">VĂN BẢN</h2>
			<div class="section-intro single-col-max mx-auto text-center mb-5">Danh sách văn bản được cập nhật theo thời gian.</div>
			<div class="row text-center" id="documents-grid">
				<div id="docs-loading" class="col-12 text-center py-5">
					<i class="fas fa-spinner fa-spin fa-2x" style="color:#ed6524"></i>
					<p class="mt-3 text-muted">Đang tải danh sách văn bản...</p>
				</div>
			</div>
		</div>
	</section>

	<section id="audience-section" class="audience-section py-5">
		<div class="container">
			<h2 class="section-heading text-center mb-4">Đối tượng áp dụng</h2>
			<div class="section-intro single-col-max mx-auto text-center mb-5" id="audience-intro"></div>
			<div class="audience mx-auto" id="audience-list"></div>
		</div>
	</section>

	<footer class="footer">
		<div class="footer-bottom text-center py-5">
			<small class="copyright">Designed with <span class="sr-only">love</span><i class="fas fa-heart" style="color: #fb866a;"></i> by <a class="theme-link" href="http://themes.3rdwavemedia.com" target="_blank">Xiaoying Riley</a> for developers — Customized for NotDore</small>
		</div>
	</footer>

	<script src="assets/plugins/popper.min.js"></script>
	<script src="assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="assets/plugins/smoothscroll.min.js"></script>
	<script src="assets/js/main.js"></script>
	<script src="assets/js/category.js"></script>
</body>

</html>
