<!DOCTYPE html>
<html lang="vi">

<head>
	<title>NotDore</title>

	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="NotDore - Kho tài liệu pháp luật">
	<link rel="shortcut icon" href="favicon.ico">

	<link href="https://fonts.googleapis.com/css?family=Quicksand:700|Roboto:400,400i,700&display=swap"
		rel="stylesheet">

	<script defer src="assets/fontawesome/js/all.min.js"></script>
	<link id="theme-style" rel="stylesheet" href="assets/css/theme.css">
	<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
	<script src="/api/config.js"></script>

	<style>
		.doc-list {
			list-style: none;
			padding: 0;
			margin: 0;
		}
		.doc-list li {
			padding: 0.625rem 1rem;
			border-bottom: 1px solid #e9ecef;
			display: flex;
			align-items: baseline;
			gap: 0.5rem;
		}
		.doc-list li:last-child {
			border-bottom: none;
		}
		.doc-list .doc-code {
			font-weight: 700;
			font-family: 'Quicksand', sans-serif;
			color: #1c1e2e;
			font-size: 0.875rem;
			white-space: nowrap;
		}
		.doc-list .doc-title {
			color: #4c527d;
			font-size: 0.85rem;
			line-height: 1.4;
		}
		.doc-list-wrapper {
			background: #fff;
			border-radius: 0.5rem;
			box-shadow: 0 5px 20px -4px rgba(0,0,0,0.08);
			padding: 1rem;
		}
		.doc-list-wrapper .list-title {
			font-size: 0.95rem;
			font-weight: bold;
			font-family: 'Quicksand', sans-serif;
			color: #ed6524;
			margin-bottom: 0.75rem;
			padding-bottom: 0.5rem;
			border-bottom: 2px solid #ed6524;
		}
		.loading {
			text-align: center;
			padding: 3rem 0;
			color: #4c527d;
		}
		.loading i {
			font-size: 2rem;
			color: #ed6524;
			margin-bottom: 1rem;
		}
		.error-msg {
			text-align: center;
			padding: 3rem 1rem;
			color: #dc3545;
		}
		.error-msg i {
			font-size: 2rem;
			margin-bottom: 1rem;
		}
	</style>
</head>

<body>
	<header class="header">
		<div class="branding">
			<div class="container-fluid position-relative py-3">
				<div class="logo-wrapper">
					<div class="site-logo"><a class="navbar-brand" href="index.html"><img class="logo-icon me-2"
								src="assets/images/site-logo.svg" alt="logo"><span class="logo-text">NotDore</span></a>
					</div>
				</div>
			</div>
		</div>
	</header>

	<!-- LẤY DATA TỪ BACKEND QUA API VÀ HIỂN THỊ TRÊN GIAO DIỆN NGƯỜI DÙNG -->
	 
	<section class="hero-section" id="hero-section">
		<div class="container">
			<div class="row" id="hero-row"></div>
		</div>
	</section>

	<section id="info-section" class="content-section">
		<div class="container">
			<div class="single-col-max mx-auto" id="overview-wrap">
				<h2 class="section-heading text-center mb-5" id="overview-title">Tổng quan</h2>
				<div class="row">
					<div class="col-12 mb-5">
						<div class="key-points mb-4 text-center">
							<ul class="key-points-list list-unstyled mb-4 mx-auto d-inline-block text-start" id="overview-list"></ul>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section id="documents-section" class="benefits-section theme-bg-light-gradient py-5">
		<div class="container py-5">
			<h2 class="section-heading text-center mb-3" id="doc-section-title">VĂN BẢN</h2>
			<div class="section-intro single-col-max mx-auto text-center mb-5" id="doc-section-intro">
				Danh sách văn bản được cập nhật theo thời gian.
			</div>
			<div class="row text-center" id="doc-grid"></div>
		</div>
	</section>

	<section id="audience-section" class="audience-section py-5 d-none">
		<div class="container">
			<h2 class="section-heading text-center mb-4">Đối tượng áp dụng</h2>
			<div class="section-intro single-col-max mx-auto text-center mb-5" id="audience-intro"></div>
			<div class="audience mx-auto" id="audience-list"></div>
		</div>
	</section>

	<footer class="footer">
		<div class="footer-bottom text-center py-5">
			<small class="copyright">Designed with <span class="sr-only">love</span><i class="fas fa-heart"
					style="color: #fb866a;"></i> by <a class="theme-link" href="http://themes.3rdwavemedia.com"
					target="_blank">Xiaoying Riley</a> for developers — Customized for NOTDORE by Theodore</small>
		</div>
	</footer>

	<script src="assets/plugins/popper.min.js"></script>
	<script src="assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="assets/plugins/smoothscroll.min.js"></script>
	<script src="assets/js/main.js"></script>

	<script>
    /* ===== Cấu hình Supabase ===== */
    const SUPABASE_URL = "%PSUPABASE_URL%";
    const SUPABASE_ANON_KEY = "%SUPABASE_ANON_KEY%";

    const TAG_MAP = {
        vat: 'thue-gtgt', tncn: 'thue-tncn',
        tndn: 'thue-tndn', bhxh: 'bhxh',
    };

    const CATEGORY_INFO = {
        vat: {
            title: "Thuế Giá Trị Gia Tăng", short: "Thuế VAT",
            description: "Tổng hợp các văn bản pháp luật về thuế giá trị gia tăng (VAT), bao gồm Luật, Nghị định, Thông tư hướng dẫn và các tài liệu liên quan.",
            overview: [
                "Thuế giá trị gia tăng (VAT) là thuế tính trên giá trị tăng thêm của hàng hóa, dịch vụ.",
                "Đối tượng chịu thuế: hàng hóa, dịch vụ sản xuất, kinh doanh và nhập khẩu.",
                "Các mức thuế suất: 0%, 5%, 10% (thuế suất cơ bản).",
                "Phương pháp tính: khấu trừ thuế và tính trực tiếp.",
                "Đối tượng không chịu thuế: 26 nhóm hàng hóa, dịch vụ theo quy định.",
                "Văn bản hiện hành: Luật số 13/2008/QH12 và các văn bản sửa đổi, bổ sung."
            ],
            audience: [
                {icon:"building",title:"Doanh nghiệp sản xuất, kinh doanh",desc:"Áp dụng cho tất cả doanh nghiệp có hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế GTGT."},
                {icon:"user-tie",title:"Hộ kinh doanh cá thể",desc:"Hộ kinh doanh có doanh thu từ 100 triệu đồng/năm trở lên phải nộp thuế GTGT."},
                {icon:"ship",title:"Tổ chức, cá nhân nhập khẩu",desc:"Tổ chức, cá nhân nhập khẩu hàng hóa chịu thuế GTGT phải kê khai và nộp thuế GTGT hàng nhập khẩu."}
            ]
        },
        tncn: {
            title: "Thuế Thu Nhập Cá Nhân", short: "Thuế TNCN",
            description: "Tổng hợp các văn bản pháp luật về thuế thu nhập cá nhân (TNCN), bao gồm Luật, Nghị định, Thông tư và các hướng dẫn liên quan.",
            overview: [
                "Thuế thu nhập cá nhân là thuế đánh vào thu nhập của cá nhân phát sinh trong kỳ tính thuế.",
                "Đối tượng nộp thuế: cá nhân cư trú và cá nhân không cư trú có thu nhập chịu thuế.",
                "Biểu thuế lũy tiến từng phần: 7 bậc thuế từ 5% đến 35%.",
                "Mức giảm trừ gia cảnh: 11 triệu đồng/tháng đối với người nộp thuế.",
                "Các khoản thu nhập được miễn thuế theo quy định của pháp luật.",
                "Văn bản hiện hành: Luật số 04/2007/QH12 và các văn bản sửa đổi, bổ sung."
            ],
            audience: [
                {icon:"user-tie",title:"Người lao động làm công hưởng lương",desc:"Thu nhập từ tiền lương, tiền công và các khoản thu nhập tương tự phải kê khai và nộp thuế TNCN."},
                {icon:"chart-pie",title:"Cá nhân kinh doanh",desc:"Cá nhân sản xuất, kinh doanh hàng hóa, dịch vụ thuộc đối tượng nộp thuế TNCN theo quy định."},
                {icon:"home",title:"Cá nhân có thu nhập từ đầu tư vốn, chuyển nhượng",desc:"Thu nhập từ đầu tư vốn, chuyển nhượng bất động sản, chuyển nhượng vốn và các khoản thu nhập khác."}
            ]
        },
        tndn: {
            title: "Thuế Thu Nhập Doanh Nghiệp", short: "Thuế TNDN",
            description: "Tổng hợp các văn bản pháp luật về thuế thu nhập doanh nghiệp (TNDN), bao gồm Luật, Nghị định, Thông tư và các hướng dẫn liên quan.",
            overview: [
                "Thuế thu nhập doanh nghiệp là thuế đánh trên thu nhập chịu thuế của doanh nghiệp.",
                "Thu nhập chịu thuế bao gồm thu nhập từ hoạt động sản xuất, kinh doanh và thu nhập khác.",
                "Thuế suất phổ thông: 20% (áp dụng cho hầu hết doanh nghiệp).",
                "Ưu đãi thuế TNDN cho doanh nghiệp trong các lĩnh vực, địa bàn ưu đãi đầu tư.",
                "Các khoản chi phí được trừ và không được trừ khi tính thuế.",
                "Văn bản hiện hành: Luật số 14/2008/QH12 và các văn bản sửa đổi, bổ sung."
            ],
            audience: [
                {icon:"building",title:"Doanh nghiệp trong nước",desc:"Mọi doanh nghiệp Việt Nam thuộc mọi thành phần kinh tế đều thuộc đối tượng nộp thuế TNDN."},
                {icon:"globe",title:"Doanh nghiệp có vốn đầu tư nước ngoài",desc:"Doanh nghiệp FDI hoạt động tại Việt Nam chịu thuế TNDN theo quy định, bao gồm cả các ưu đãi đầu tư."},
                {icon:"landmark",title:"Tổ chức khác có hoạt động sản xuất, kinh doanh",desc:"Các tổ chức khác ngoài doanh nghiệp có hoạt động sản xuất, kinh doanh hàng hóa, dịch vụ chịu thuế TNDN."}
            ]
        },
        bhxh: {
            title: "Bảo Hiểm Xã Hội", short: "BHXH",
            description: "Tổng hợp các văn bản pháp luật về bảo hiểm xã hội (BHXH), bảo hiểm y tế (BHYT) và bảo hiểm thất nghiệp (BHTN).",
            overview: [
                "Bảo hiểm xã hội là sự bảo đảm thay thế hoặc bù đắp một phần thu nhập cho người lao động.",
                "Các chế độ BHXH bắt buộc: ốm đau, thai sản, tai nạn lao động, hưu trí, tử tuất.",
                "Mức đóng BHXH bắt buộc: 32% (21.5% từ người sử dụng lao động, 10.5% từ người lao động).",
                "Bảo hiểm y tế: mức đóng 4.5% (3% từ người sử dụng lao động, 1.5% từ người lao động).",
                "Bảo hiểm thất nghiệp: mức đóng 2% (1% từ người sử dụng lao động, 1% từ người lao động).",
                "Văn bản hiện hành: Luật BHXH số 58/2014/QH13 và Luật sửa đổi số 28/2024/QH15."
            ],
            audience: [
                {icon:"users",title:"Người lao động",desc:"Người lao động làm việc theo hợp đồng lao động từ đủ 01 tháng trở lên thuộc đối tượng tham gia BHXH bắt buộc."},
                {icon:"building",title:"Người sử dụng lao động",desc:"Doanh nghiệp, cơ quan, tổ chức, hợp tác xã, hộ kinh doanh có thuê mướn lao động."},
                {icon:"hand-holding-heart",title:"Người tham gia BHXH tự nguyện",desc:"Công dân Việt Nam từ đủ 15 tuổi trở lên không thuộc đối tượng tham gia BHXH bắt buộc có thể tham gia BHXH tự nguyện."}
            ]
        }
    };

    const ICONS = ['file-alt', 'gavel', 'book', 'file-invoice', 'exchange-alt', 'percent', 'file-contract', 'envelope', 'chart-line', 'hand-holding-heart', 'star', 'calculator'];

    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'vat';

    function renderHero(info, sidebarDocs) {
        document.getElementById('hero-row').innerHTML = `
            <div class="col-12 col-md-7 pt-5 mb-5 align-self-center">
                <div class="promo pe-md-3 pe-lg-5">
                    <h1 class="headline mb-3">${info.title}</h1>
                    <div class="subheadline mb-4">${info.description}</div>
                    <div class="cta-holder row gx-md-3 gy-3 gy-md-0">
                        <div class="col-12 col-md-auto"><a class="btn btn-primary w-100" href="#documents-section">Danh sách văn bản</a></div>
                        <div class="col-12 col-md-auto"><a class="btn btn-secondary scrollto w-100" href="#info-section">Tổng quan</a></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-5 mb-5 align-self-center">
                <div class="doc-list-wrapper">
                    <div class="list-title"><i class="fas fa-file-alt me-2"></i>Văn bản mới nhất</div>
                    <ul class="doc-list">${sidebarDocs.slice(0,6).map(d => `
                        <li><i class="fas fa-file-alt me-2" style="color:#ed6524;font-size:0.75rem;"></i><span class="doc-code">${d.code}</span><span class="doc-title">${d.title}</span></li>
                    `).join('')}</ul>
                </div>
            </div>
        `;
    }

    function renderOverview(info) {
        document.getElementById('overview-title').textContent = `Tổng quan về ${info.title}`;
        document.getElementById('overview-list').innerHTML = info.overview.map(p =>
            `<li><i class="fas fa-check-circle me-2"></i>${p}</li>`
        ).join('');
    }

    function renderDocs(docs) {
        const grid = document.getElementById('doc-grid');
        if (!docs.length) {
            grid.innerHTML = '<div class="col-12"><p class="text-muted">Chưa có văn bản nào.</p></div>';
            return;
        }
        grid.innerHTML = docs.map((d, i) => `
            <div class="item col-12 col-md-6 col-lg-4">
                <div class="item-inner p-3 p-lg-4">
                    <div class="item-header mb-3">
                        <div class="item-icon"><i class="fas fa-${ICONS[i % ICONS.length]}"></i></div>
                        <h3 class="item-heading">${d.code}</h3>
                    </div>
                    <div class="item-desc">${d.title}</div>
                </div>
            </div>
        `).join('');
    }

    function renderAudience(info) {
        const section = document.getElementById('audience-section');
        section.classList.remove('d-none');
        document.getElementById('audience-intro').textContent = `${info.title} áp dụng cho các đối tượng theo quy định của pháp luật.`;
        document.getElementById('audience-list').innerHTML = info.audience.map(a => `
            <div class="item row gx-3">
                <div class="col-auto item-icon"><i class="fas fa-${a.icon}"></i></div>
                <div class="col"><h4 class="item-title">${a.title}</h4><div class="item-desc">${a.desc}</div></div>
            </div>
        `).join('');
    }

    async function init() {
        const info = CATEGORY_INFO[cat];
        if (!info) { window.location.href = 'index.html'; return; }
        document.title = `${info.title} - NotDore`;

        try {
            const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const tagName = TAG_MAP[cat];
            const { data: tag } = await supabase.from('document_tags').select('id').eq('name', tagName).single();
            if (!tag) { renderDocs([]); return; }

            const { data: mapping } = await supabase.from('document_tag_map').select('document_id').eq('tag_id', tag.id);
            if (!mapping || !mapping.length) { renderDocs([]); return; }

            const ids = mapping.map(m => m.document_id);
            const { data: docs } = await supabase.from('documents').select('id, code, title').in('id', ids);

            renderHero(info, docs || []);
            renderOverview(info);
            renderDocs(docs || []);
            renderAudience(info);
        } catch (err) {
            console.error(err);
            document.getElementById('hero-row').innerHTML = `
                <div class="col-12 error-msg">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Không thể kết nối Supabase. Vui lòng kiểm tra cấu hình.</p>
                    <a class="btn btn-primary" href="index.html">Về trang chủ</a>
                </div>
            `;
        }
    }

    init();
</script>

</body>

</html>
